# Pulse — k2 / tasdiq-dev values.
# Co-located with x4auth-server so X4Auth is reached at the in-cluster service DNS.
# Azure/Entra is DISABLED here (air-gapped: no route to login.microsoftonline.com) —
# X4Auth is the sole auth path. See README.md "Azure must be off on k2" before deploying.

image:
  repository: 172.26.34.205:5000/infra/pulse-server   # k2-registry (insecure, internal)
  tag: dev                                             # bumped by bin/promote.sh
  pullPolicy: IfNotPresent

port: 8080

ingress:
  # service15.nexedge.ae — free SNI confirmed via kps-lb HAProxy review (2026-06-09).
  # Used: KPS 6-10; k2 1-5,11-14,16-20. 15 is the gap in the k2 block → assigned to pulse.
  # REQUIRES adding service15 to the sni_k2 ACL in /etc/haproxy/haproxy.cfg on kps-lb (see README).
  host: service15.nexedge.ae
  gateway: platform-gateway

health:
  path: /api/health
  port: 8080

resources:
  requests: { cpu: 500m, memory: 768Mi }
  limits:   { cpu: "1",  memory: 1536Mi }

# Non-sensitive env (ConfigMap). X4AUTH_BASE_URL is computed from the namespace
# in templates/configmap.yaml — do NOT set it here.
config:
  SPRING_PROFILES_ACTIVE: k2

  # ── Auth: X4Auth ON, Azure OFF (air-gap) ──────────────────────────────────
  # SPRING_PROFILES_ACTIVE=k2 (set above) excludes the "azure" profile, so the Azure
  # OAuth2 client config (application-azure.yaml) and the AAD security chain are absent —
  # no login.microsoftonline.com call at startup. X4Auth is the sole login path.
  X4AUTH_CLIENT_ID: pulse                         # must be registered in x4auth-admin-portal
  X4AUTH_OAUTH_SCOPE: openid profile email roles
  X4AUTH_TIMEOUT: "30000"

  # ── Datastores (k2 Postgres + Redis) — verified against deployed mahara-config ──
  DB_HOST: "172.26.34.208"      # k2 Postgres (same host mahara_dev uses); pulse_dev DB+user must be created here
  DB_PORT: "5432"
  DB_NAME: pulse_dev
  DB_USER: pulse
  REDIS_HOST: redis             # in-namespace redis service (confirmed: mahara uses the same)
  REDIS_PORT: "6379"
  REDIS_DATABASE: "2"

  # ── Misc ──────────────────────────────────────────────────────────────────
  TRANSLATION_PROVIDER: NONE    # Azure translator unreachable on k2
  SF_DRY_RUN: "true"            # SuccessFactors unreachable on k2
  CORS_ALLOWED_ORIGINS: https://service15.nexedge.ae
  DEEP_LINK_SCHEME: pulse

# Secret (created out-of-band — never committed). See pulse-secrets.example.yaml.
# Must contain: DB_PASSWORD, REDIS_PASSWORD, JWT_SECRET, ENCRYPTION_KEY, X4AUTH_CLIENT_SECRET
secretName: pulse-secrets
