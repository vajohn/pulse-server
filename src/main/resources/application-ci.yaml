# CI profile — used in GitHub Actions load-test and contract-test jobs.
# Disables rate limiting (JWT-only auth is enough for CI). Login is X4Auth-only;
# no Azure config remains.
# Activate with: SPRING_PROFILES_ACTIVE=ci

rate-limiting:
  enabled: false

pulse:
  dev:
    auto-admin: false
  deep-link-scheme: com.edge.pulse.dev
