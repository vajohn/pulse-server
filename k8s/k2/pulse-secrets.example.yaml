# EXAMPLE ONLY — do not commit real values. Create the real Secret out-of-band on k2
# (sealed-secret / SOPS / kubectl create secret), never in the GitOps repo in plaintext.
#
#   kubectl create secret generic pulse-secrets -n tasdiq-dev \
#     --from-literal=DB_PASSWORD='...' \
#     --from-literal=REDIS_PASSWORD='...' \
#     --from-literal=JWT_SECRET='...(>=32 chars)' \
#     --from-literal=ENCRYPTION_KEY='...(distinct from JWT_SECRET; 32 bytes/64 hex)' \
#     --from-literal=X4AUTH_CLIENT_SECRET='...(from x4auth-admin-portal, client "pulse")'
apiVersion: v1
kind: Secret
metadata:
  name: pulse-secrets
  namespace: tasdiq-dev
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME"
  REDIS_PASSWORD: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME_min_32_chars"
  ENCRYPTION_KEY: "REPLACE_ME_distinct_from_jwt_secret"   # MUST differ from JWT_SECRET
  X4AUTH_CLIENT_SECRET: "REPLACE_ME_from_x4auth_admin_portal"
