# Azure/Entra login configuration — loaded ONLY under the "azure" profile.
#
# The base application.yaml defaults spring.profiles.active=azure, so KPS, local dev, and
# tests load this file and behave exactly as before. The air-gapped k2 deployment sets
# SPRING_PROFILES_ACTIVE=k2 (no azure), so none of this is present and Spring never tries to
# resolve the Microsoft issuer-uri at startup — Pulse runs X4Auth-only there.
#
# The AAD security chain (AadOAuth2LoginSecurityConfig.oauthFilterChain) is @Profile("azure"),
# so it loads in lockstep with this config.
spring:
  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/azure"
            scope: openid,profile,email,User.Read,offline_access
        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
  cloud:
    azure:
      active-directory:
        enabled: true
        profile:
          tenant-id: ${AZURE_TENANT_ID}
        credential:
          client-id: ${AZURE_CLIENT_ID}
          client-secret: ${AZURE_CLIENT_SECRET}
        authorization-clients:
          graph:
            scopes: https://graph.microsoft.com/User.Read
