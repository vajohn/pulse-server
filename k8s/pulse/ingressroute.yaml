apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulse-ingress
  namespace: pulse
spec:
  entryPoints: [websecure]
  routes:
    - kind: Rule
      match: Host(`service9.nexedge.ae`)
      services:
        - name: pulse-server
          port: 8080
  tls:
    secretName: kps-tls-cert
